<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Landatome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="nofollow,nosnippet">
  <link rel="icon" type="image/png" sizes="16x16" href="images/MC-Escher-Impossible-Cube.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(to right, #ffffff, #0000ee);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Georgia, serif;
    }

    h1 {
      color: #fff;
      font-style: italic;
      text-align: center;
      margin: 40px 0 50px;
      font-size: 2.5rem;
      text-shadow:
        #F5F 0 -1px 4px,
        #fff 0 -2px 10px,
        #fff 0 -10px 20px,
        red 0 -18px 40px;
    }

    .authentification {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 36px 32px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.15);
    }

    .authentification label {
      color: #000;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 48px 12px 16px;
      font-size: 16px;
      border: 2px solid rgba(0,0,100,0.3);
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      color: #000;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrapper input:focus {
      border-color: #0000ee;
    }

    .toggle-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .btn-valider {
      width: 100%;
      padding: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: #0000cc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-valider:hover,
    .btn-valider:active {
      background: #0000aa;
    }

    .video-wrapper {
      margin-top: 40px;
      margin-bottom: 40px;
      width: 90%;
      max-width: 640px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <h1>Landatome</h1>

  <div class="authentification">
    <label for="plaintext">Mot de passe</label>
    <div class="input-wrapper">
      <input
        type="password"
        id="plaintext"
        placeholder="mot de passe"
        autocomplete="current-password"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button class="toggle-eye" id="toggleBtn" onclick="toggleVisibility()" tabindex="-1" aria-label="Afficher le mot de passe">
        👁
      </button>
    </div>
    <button class="btn-valider" onclick="handleHash()">Valider</button>
  </div>

  <div class="video-wrapper">
    <video controls autoplay muted playsinline>
      <source src="00_videos/anime_eip.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la lecture de vidéos HTML5.
      <a href="00_videos/anime_eip.mp4">Télécharger la vidéo</a>.
    </video>
  </div>

  <script>
    const input = document.getElementById('plaintext');
    let visible = false;

    function toggleVisibility() {
      visible = !visible;
      input.type = visible ? 'text' : 'password';
      document.getElementById('toggleBtn').textContent = visible ? '🙈' : '👁';
      input.focus();
    }

    function sha256(str) {
      const buffer = new TextEncoder().encode(str);
      return crypto.subtle.digest('SHA-256', buffer).then(hash => {
        return Array.from(new Uint8Array(hash))
          .map(byte => byte.toString(16).padStart(2, '0'))
          .join('');
      });
    }

    function handleHash() {
      const plaintext = input.value;
      if (!plaintext) return;
      sha256(plaintext)
        .then(hash => {
          const modifiedHash = hash.slice(0, 20) + '/' + hash.slice(20) + '.html';
          window.location.href = modifiedHash;
        })
        .catch(error => {
          console.error('Erreur :', error);
        })
        .finally(() => {
          input.value = '';
        });
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleHash();
    });
  </script>

</body>
</html>
